{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/style.css' %}">
    <script src="{% static 'todo/theme.js' %}" defer></script>
  </head>

  <body>
    <div class="container">
      <div class="header-row">
        <h1>Edit task</h1>
        <div class="header-actions">
          <button id="themeToggle" class="theme-toggle" aria-pressed="false" title="Toggle theme">Toggle Theme</button>
        </div>
      </div>

      <p class="muted">You can edit tasks from the following form.</p>
      <form action="{% url 'update' task.id%}" method="post">
        {% csrf_token %}
        <div class="row">
          <label for="titleInput">Title</label>
          <input id="titleInput" name="title" type="text" placeholder="Input title" value="{{ task.title }}">
        </div>
        <div class="row">
          <label for="descriptionInput">Description</label>
          <textarea id="descriptionInput" name="description" placeholder="Input description">{{ task.description }}</textarea>
        </div>
        <div class="row">
          <label for="dueInput">Due at:</label>
          <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at |date:"Y-m-d H:i" }}">
        </div>
        <div class="row">
          <button type="submit">Submit</button>
        </div>
      </form>
      <br>
    </div>
  </body>

</html>
